openapi: 3.0.1
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:18080
  description: Generated server url
tags:
- name: Distributor
  description: CQ queries and registration for Distributors
- name: Simulations
  description: Distributor simulation operations
- name: Shipment Queries
  description: Query endpoints for shipment look-ups
paths:
  /api/v1/distributors/{distributorId}/products/{productId}:
    put:
      tags:
      - Distributor
      summary: Revise product
      description: Revise product details and financing configurations.
      operationId: reviseProduct
      parameters:
      - name: distributorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: productId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductCommand"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
    delete:
      tags:
      - Distributor
      summary: Retire product
      description: Retire product ensuring no active contracts are linked.
      operationId: retireProduct
      parameters:
      - name: distributorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: productId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductInfoCommand"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /api/v1/catalog/shipments/{shipmentId}:
    get:
      tags:
      - Shipment Queries
      summary: Get shipment by ID
      description: Retrieve a single shipment by its unique identifier.
      operationId: getShipment
      parameters:
      - name: shipmentId
        in: path
        description: Shipment identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShipmentDTO"
    put:
      tags:
      - Shipment Queries
      summary: Update shipment
      description: Update an existing shipment.
      operationId: updateShipment
      parameters:
      - name: shipmentId
        in: path
        description: Shipment identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShipmentDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShipmentDTO"
    delete:
      tags:
      - Shipment Queries
      summary: Delete shipment
      description: Delete a shipment by its identifier.
      operationId: deleteShipment
      parameters:
      - name: shipmentId
        in: path
        description: Shipment identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
  /api/v1/catalog/shipments/{shipmentId}/status:
    put:
      tags:
      - Shipment Queries
      summary: Update shipment status
      description: Update the status of a shipment.
      operationId: updateShipmentStatus
      parameters:
      - name: shipmentId
        in: path
        description: Shipment identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        description: New status
        required: true
        schema:
          type: string
      - name: updatedBy
        in: query
        description: ID of the user updating the status
        required: false
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShipmentDTO"
  /api/v1/distributors/{distributorId}/simulations:
    post:
