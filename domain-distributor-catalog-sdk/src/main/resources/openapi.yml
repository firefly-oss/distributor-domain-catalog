  /api/v1/distributors/{distributorId}/simulations/{simulationId}:
    get:
      tags:
      - Simulations
      summary: Get simulation
      description: Retrieve a simulation by its identifier for a given distributor.
      operationId: getSimulation
      parameters:
      - name: distributorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
